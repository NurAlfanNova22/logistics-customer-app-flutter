name: ekspedisi_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  http: ^1.2.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_database: ^12.1.4
  google_maps_flutter: ^2.10.0
  geocoding: ^4.0.0
  url_launcher: ^6.3.2
  intl: ^0.20.2
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  assets:
    - assets/icon/logo.png
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png" # untuk iOS
  adaptive_icon_background: "assets/icon/bg.png"
  adaptive_icon_foreground: "assets/icon/fg.png"
